name: Build and Deploy HOPFAN Library

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: chadrack-123
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/chadrack-123/hopfan_library:latest .
          docker push ghcr.io/chadrack-123/hopfan_library:latest

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Deploy on home server
        run: |
          cd /home/chadrack/apps/hopfan-library
          docker compose pull
          docker compose up -d